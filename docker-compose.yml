services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: discord_bot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: discord_server_bot
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U discord_bot"]
      interval: 10s
      timeout: 5s
      retries: 5

  server-bot:
    build: ./discord-server-bot
    container_name: discord-server-bot
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    env_file: ./discord-server-bot/.env
    environment:
      DATABASE_URL: postgresql://discord_bot:${POSTGRES_PASSWORD:-changeme}@postgres:5432/discord_server_bot
    volumes:
      - server-bot-data:/app/data

  music-bot:
    build: ./discord-music-bot
    container_name: discord-music-bot
    restart: always
    env_file: ./discord-music-bot/.env
    volumes:
      - music-bot-data:/app/data

volumes:
  pgdata:
  server-bot-data:
  music-bot-data:
